name: Firmware CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [esp32c3, esp8266]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO and esptool deps
        run: pip install platformio intelhex

      - name: Validate compact config contract
        run: python scripts/validate_config_contract.py

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      - name: Build filesystem image
        run: pio run -t buildfs -e ${{ matrix.env }}

  installer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vercel_installer_local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vercel_installer_local/package-lock.json

      - name: Install installer dependencies
        run: npm ci

      - name: Build installer
        run: npm run build
