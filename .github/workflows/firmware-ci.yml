name: Firmware CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO and esptool deps
        run: pip install platformio intelhex

      - name: Validate compact config contract
        run: python scripts/validate_config_contract.py

      - name: Build ESP32-C3 firmware
        run: pio run -e esp32c3

      - name: Build ESP32-C3 filesystem image
        run: pio run -t buildfs -e esp32c3

      - name: Build ESP8266 firmware
        run: pio run -e esp8266

      - name: Build ESP8266 filesystem image
        run: pio run -t buildfs -e esp8266

      - name: Upload firmware CI binaries
        uses: actions/upload-artifact@v4
        with:
          name: alarmmini-firmware-ci-binaries
          path: |
            firmware/.pio/build/esp32c3/firmware.bin
            firmware/.pio/build/esp32c3/littlefs.bin
            firmware/.pio/build/esp32c3/bootloader.bin
            firmware/.pio/build/esp32c3/partitions.bin
            firmware/.pio/build/esp8266/firmware.bin
            firmware/.pio/build/esp8266/littlefs.bin
          if-no-files-found: error
          retention-days: 14

  installer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vercel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vercel/package-lock.json

      - name: Install installer dependencies
        run: npm ci

      - name: Build installer
        run: npm run build
