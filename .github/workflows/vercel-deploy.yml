name: Vercel Deploy

on:
  push:
    branches: [ main, master ]
    paths:
      - "vercel/**"
      - ".github/workflows/vercel-deploy.yml"
  pull_request:
    paths:
      - "vercel/**"
      - ".github/workflows/vercel-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_CLI_VERSION: 50.28.0
  VERCEL_SCOPE: webdevdens-projects
  VERCEL_PROJECT: prj_ZthdDaptOcvRvXbgLh4aViAjRWJg

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vercel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vercel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Vercel token
        run: test -n "${{ secrets.VERCEL_TOKEN }}"

      - name: Link Vercel preview project
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} link --yes --scope=${{ env.VERCEL_SCOPE }} --project=${{ env.VERCEL_PROJECT }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel preview environment
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        run: |
          url=$(npx vercel@${{ env.VERCEL_CLI_VERSION }} deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview deployment: $url"
          curl --fail --silent --show-error --location "$url" > /dev/null

  production:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: vercel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vercel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Vercel token
        run: test -n "${{ secrets.VERCEL_TOKEN }}"

      - name: Link Vercel production project
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} link --yes --scope=${{ env.VERCEL_SCOPE }} --project=${{ env.VERCEL_PROJECT }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel production environment
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        run: |
          url=$(npx vercel@${{ env.VERCEL_CLI_VERSION }} deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Production deployment: $url"
          curl --fail --silent --show-error --location "$url" > /dev/null

      - name: Check production alias
        run: curl --fail --silent --show-error --location https://alarmmini.vercel.app/ > /dev/null
